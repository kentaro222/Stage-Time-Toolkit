<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js');
    });
  }
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="google" content="notranslate">
<title>Stage Time Toolkit</title>

<link rel="stylesheet" href="flatpickr.min.css">
<link rel="stylesheet" type="text/css" href="dark.css">
<script src="flatpickr.min.js"></script>


<style>
    /* =========================================
       共通・ベーススタイル
       ========================================= */
    :root {
        --bg-color: #121212;
        --text-color: #e0e0e0;
        --panel-bg: #1e1e1e;
        --border-color: #333;
        --sw-accent: #00e676; /* ストップウォッチの色 */
        --sw-danger: #ff5252;
        --bt-accent: #e74c3c; /* バータイマーの色 */
    }
    * { box-sizing: border-box; }
    
    body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: 'Helvetica Neue', Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
    }
    button { font-family: inherit; }

    /* --- タブメニュー --- */
    .tab-bar {
        display: flex;
        background-color: #161616;
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 100;
    }
    .tab-btn {
        flex: 1; padding: 15px; background: none; border: none;
        color: #888; font-size: 1.1rem; cursor: pointer; transition: 0.2s;
        border-bottom: 3px solid transparent;
    }
    .tab-btn:hover { background-color: rgba(255,255,255,0.05); }
    .tab-btn.active { color: var(--text-color); font-weight: bold; }
    .tab-btn[data-target="app-stopwatch"].active { border-bottom-color: var(--sw-accent); }
    .tab-btn[data-target="app-bartimer"].active { border-bottom-color: var(--bt-accent); }

    /* --- アプリコンテナ --- */
    .app-container {
        display: none; flex-direction: column; align-items: center;
        padding: 20px; width: 100%; max-width: 800px; margin-inline: auto;
        flex-grow: 1; animation: fadeIn 0.3s ease;
    }
    .app-container.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* --- 共通コンポーネント (消灯防止ボタン等) --- */
    .status-btn {
        display: flex; align-items: center; gap: 8px;
        background: transparent; border: 1px solid var(--border-color);
        color: #888; padding: 5px 10px; border-radius: 6px;
        cursor: pointer; font-size: 0.9rem; transition: all 0.2s;
    }
    .status-btn:hover { background-color: rgba(255,255,255,0.05); }
    .indicator-dot { width: 10px; height: 10px; border-radius: 50%; background-color: #555; }


    /* =========================================
       ストップウォッチ用スタイル
       ========================================= */
    #app-stopwatch .status-btn.active-lock { color: var(--text-color); border-color: var(--sw-accent); }
    #app-stopwatch .indicator-dot.active { background-color: var(--sw-accent); box-shadow: 0 0 8px var(--sw-accent); }
    
    #sw-time-display { font-size: 4.5rem; font-family: monospace; font-weight: bold; color: var(--sw-accent); margin: 10px 0 20px 0; letter-spacing: 3px; }
    #sw-status-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
    
    .sw-controls { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
    .sw-controls button { background-color: var(--panel-bg); color: var(--text-color); border: 1px solid var(--border-color); padding: 15px 30px; font-size: 1.2rem; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .sw-controls button:active { transform: scale(0.95); }
    .sw-controls button.primary { background-color: var(--sw-accent); color: #000; font-weight: bold; }
    .sw-controls button.danger { border-color: var(--sw-danger); color: var(--sw-danger); }

    .sw-base-time-container { display: flex; align-items: center; gap: 8px; background-color: var(--panel-bg); padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border-color); }
    #sw-base-time-input { background-color: transparent; color: var(--sw-accent); border: none; font-family: monospace; font-size: 1.1rem; outline: none; }
    #sw-base-time-input:disabled { color: #555; cursor: not-allowed; }

    .sw-lap-container { width: 100%; background-color: var(--panel-bg); border-radius: 8px; padding: 15px; }
    .sw-lap-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
    .sw-lap-list { list-style: none; padding: 0; margin: 0; max-height: 40vh; overflow-y: auto; }
    .sw-lap-item { display: grid; grid-template-columns: 50px 90px 90px 1fr; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px dashed var(--border-color); }
    .sw-lap-item input { background-color: #2a2a2a; color: white; border: 1px solid var(--border-color); padding: 8px; border-radius: 4px; width: 100%; }


    /* =========================================
       バータイマー用スタイル
       ========================================= */
    #app-bartimer .status-btn.active-lock { color: var(--text-color); border-color: var(--bt-accent); }
    #app-bartimer .indicator-dot.active { background-color: var(--bt-accent); box-shadow: 0 0 8px var(--bt-accent); }

    .bt-header { width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; color: #888; }
    .bt-countdown { font-size: 5rem; font-weight: bold; font-variant-numeric: tabular-nums; margin: 10px 0; color: white; }
    .bt-status { font-size: 1.2rem; color: #aaa; margin-bottom: 20px; text-align: center;}

    .bt-progress-container { width: 100%; max-width: 600px; height: 40px; background: #333; border-radius: 20px; overflow: hidden; margin-bottom: 30px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
    #bt-progress-bar { width: 100%; height: 100%; background: var(--bt-accent); transition: width 0.5s linear; }

    .bt-settings { width: 100%; max-width: 500px; background: #222; padding: 20px; border-radius: 10px; }
    .bt-controls-top { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
    
    .bt-time-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; width: 100%; }
    
    /* 復元：flatpickr用テキストインプット */
    .bt-time-row input[type="text"].target-time { 
        flex: 1; padding: 12px; border-radius: 5px; border: none; font-size: 18px; 
        background: #333; color: white; text-align: center; cursor: pointer; width: 100%; 
    }
    
    .bt-settings button { padding: 12px 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; font-size: 16px; }
    .bt-settings button:hover { opacity: 0.8; }
    
    .bt-btn-del { background: #c0392b; color: white; padding: 12px; flex-shrink: 0; }
    .bt-btn-insert { background: #2980b9; color: white; padding: 12px; flex-shrink: 0; } /* 挿入ボタン用に追加 */
    .bt-btn-action { background: #3498db; color: white; flex: 1; }
    .bt-btn-add-top { background: #8e44ad; color: white; flex: 1; } /* 先頭に追加ボタン用 */
    .bt-btn-clear { background: #7f8c8d; color: white; }
    .bt-start-btn { background: #27ae60; width: 100%; font-size: 1.5rem; padding: 15px; color: white; margin-top: 5px;}
    
    /* 復元：追加コントロールエリア */
    .bt-add-controls { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; }
    .bt-btn-add { background: #555; color: white; flex: 1; margin: 0; }
    .bt-rel-time-wrapper { display: flex; gap: 5px; flex: 1.5; }
    .bt-rel-time-input { width: 70px; padding: 12px; border-radius: 5px; border: none; font-size: 16px; background: #333; color: white; text-align: center; }
    .bt-btn-rel { background: #9b59b6; color: white; flex: 1; margin: 0; }
    
    /* ★変更：現在進行中のパネルを強調表示するスタイル */
    .bt-active-row { 
        background: rgba(231, 76, 60, 0.2); /* 全体を赤く光らせる */
        box-shadow: inset 0 0 0 1px var(--bt-accent); /* 赤い枠線 */
        border-radius: 5px;
    }
    .bt-active-row input[type="text"].target-time { 
        color: var(--bt-accent); 
        font-weight: bold; 
        background: transparent; /* 背景を透過して行のハイライトを目立たせる */
    }

    @media (max-width: 600px) {
        #sw-time-display, .bt-countdown { font-size: 3.5rem; }
        .sw-lap-item { grid-template-columns: 40px 80px 80px 1fr; font-size: 0.9rem; }
        .tab-btn { font-size: 0.9rem; padding: 10px; }
        .bt-controls-top { font-size: 0.85rem; }
    }
</style>
</head>
<body>

    <div class="tab-bar">
        <button class="tab-btn active" data-target="app-stopwatch">記録ストップウォッチ</button>
        <button class="tab-btn" data-target="app-bartimer">進行バータイマー</button>
    </div>

    <div id="app-stopwatch" class="app-container active">
        <div id="sw-status-bar">
            <button id="sw-btn-wakelock" class="status-btn" title="クリックで消灯防止をON/OFF">
                <div id="sw-wake-lock-dot" class="indicator-dot"></div>
                <span>消灯防止</span>
            </button>
            <div id="sw-currentTime" style="color:#888;">現在時刻: --:--:--</div>
            <div class="sw-base-time-container">
                起点時刻: <input type="time" id="sw-base-time-input" step="1" disabled title="ここを変更するとタイマーの経過時間が連動してズレます">
            </div>
        </div>

        <div id="sw-time-display">00:00:00</div>

        <div class="sw-controls">
            <button id="sw-btn-start" class="primary">Start</button>
            <button id="sw-btn-lap">Lap / Memo</button>
            <button id="sw-btn-reset" class="danger">Reset</button>
        </div>

        <div class="sw-lap-container">
            <div class="sw-lap-header">
                <h3 style="margin:0;">記録 (Laps)</h3>
                <button id="sw-btn-export" style="background:#444; color:white; border:none; border-radius:4px; padding: 8px 15px; font-size: 0.9rem; cursor:pointer;">CSV出力</button>
            </div>
            <ul id="sw-lap-list" class="sw-lap-list"></ul>
        </div>
    </div>


    <div id="app-bartimer" class="app-container">
        <div class="bt-header">
            <button id="bt-btn-wakelock" class="status-btn" title="クリックで消灯防止をON/OFF">
                <div id="bt-wake-lock-dot" class="indicator-dot"></div>
                <span>消灯防止</span>
            </button>
            <div id="bt-currentTime">現在時刻: --:--:--</div>
        </div>
        
        <div class="bt-countdown" id="bt-countdown">00:00</div>
        <div class="bt-status" id="bt-status">設定してください</div>

        <div class="bt-progress-container">
            <div id="bt-progress-bar"></div>
        </div>

        <div class="bt-settings">
            <div class="bt-controls-top">
                <button class="bt-btn-action" id="bt-btn-start-now">現在で開始</button>
                <button class="bt-btn-add-top" id="bt-btn-add-top">先頭に追加</button>
                <button class="bt-btn-clear" id="bt-btn-clear-all">消去</button>
            </div>

            <div id="bt-timeInputs"></div>
            
            <div class="bt-add-controls">
                <button class="bt-btn-add" id="bt-btn-add-empty">＋空欄</button>
                <div class="bt-rel-time-wrapper">
                    <input type="number" id="bt-relMins" class="bt-rel-time-input" value="15" min="1">
                    <button class="bt-btn-rel" id="bt-btn-add-rel">分後を追加</button>
                </div>
            </div>
            
            <button class="bt-start-btn" id="bt-mainBtn">スタート</button>
        </div>
    </div>

<script>
// ==========================================
// タブ切り替えロジック (状態保存付き)
// ==========================================
const tabBtns = document.querySelectorAll('.tab-btn');

const savedTab = localStorage.getItem('stageActiveTab');
if (savedTab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.app-container').forEach(c => c.classList.remove('active'));
    const targetBtn = document.querySelector(`.tab-btn[data-target="${savedTab}"]`);
    if (targetBtn) {
        targetBtn.classList.add('active');
        document.getElementById(savedTab).classList.add('active');
    } else {
        tabBtns[0].classList.add('active');
        document.getElementById(tabBtns[0].dataset.target).classList.add('active');
    }
}

tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.app-container').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        const targetId = btn.dataset.target;
        document.getElementById(targetId).classList.add('active');
        localStorage.setItem('stageActiveTab', targetId);
    });
});


// ==========================================
// アプリ1: ストップウォッチ ロジック
// ==========================================
(() => {
    let state = { isRunning: false, startTime: 0, accumulatedTime: 0, baseShowTime: null, laps: [] };
    let animationFrameId = null;
    let wakeLock = null;

    const els = {
        timeDisplay: document.getElementById('sw-time-display'), lapList: document.getElementById('sw-lap-list'),
        btnStart: document.getElementById('sw-btn-start'), baseTimeInput: document.getElementById('sw-base-time-input'),
        btnWakeLock: document.getElementById('sw-btn-wakelock'), wakeLockDot: document.getElementById('sw-wake-lock-dot'),
        btnLap: document.getElementById('sw-btn-lap'), btnReset: document.getElementById('sw-btn-reset'), btnExport: document.getElementById('sw-btn-export'),
        currentTime: document.getElementById('sw-currentTime') // ★追加
    };

    function init() {
        const saved = localStorage.getItem('stageTimerState');
        if (saved) {
            state = JSON.parse(saved);
            updateBaseTimeDisplay();
            if (state.isRunning) {
                requestAnimationFrame(updateTime);
                els.btnStart.textContent = "Stop"; els.btnStart.classList.remove("primary");
                requestWakeLock();
            } else { renderTime(state.accumulatedTime); }
            renderLaps();
        }

        // ★現在時刻の定期更新を開始
        updateRealTime();
        setInterval(updateRealTime, 1000);
    }
    
    function saveState() { localStorage.setItem('stageTimerState', JSON.stringify(state)); }

    // ★現在時刻の描画関数
    function updateRealTime() {
        if(els.currentTime) els.currentTime.textContent = `現在時刻: ${new Date().toLocaleTimeString()}`;
    }

    function formatTime(ms) {
        const isNegative = ms < 0;
        const totalSeconds = Math.floor(Math.abs(ms) / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        return `${isNegative ? "-" : ""}${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function formatRealTime(date = new Date()) {
        return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}:${String(date.getSeconds()).padStart(2, '0')}`;
    }

    function renderTime(ms) { els.timeDisplay.textContent = formatTime(ms); }

    function updateTime() {
        if (!state.isRunning) return;
        renderTime(state.accumulatedTime + (Date.now() - state.startTime));
        animationFrameId = requestAnimationFrame(updateTime);
    }

    function updateBaseTimeDisplay() {
        if (state.baseShowTime) {
            els.baseTimeInput.value = formatRealTime(new Date(state.baseShowTime));
            els.baseTimeInput.disabled = false;
        } else {
            els.baseTimeInput.value = ""; els.baseTimeInput.disabled = true;
        }
    }

    els.baseTimeInput.addEventListener('change', (e) => {
        if (!state.baseShowTime || !e.target.value) return;
        const [hours, minutes, seconds] = e.target.value.split(':').map(Number);
        const oldDate = new Date(state.baseShowTime);
        const newTimestamp = new Date(oldDate.getFullYear(), oldDate.getMonth(), oldDate.getDate(), hours, minutes, seconds || 0).getTime();
        state.accumulatedTime += (state.baseShowTime - newTimestamp);
        state.baseShowTime = newTimestamp;
        if (!state.isRunning) renderTime(state.accumulatedTime);
        saveState();
    });

    async function requestWakeLock() {
        if (!('wakeLock' in navigator) || wakeLock !== null) return;
        try {
            wakeLock = await navigator.wakeLock.request('screen');
            els.wakeLockDot.classList.add('active'); els.btnWakeLock.classList.add('active-lock');
            wakeLock.addEventListener('release', () => {
                els.wakeLockDot.classList.remove('active'); els.btnWakeLock.classList.remove('active-lock');
                wakeLock = null;
            });
        } catch (err) { console.warn('SW Wake Lock error:', err); }
    }

    function releaseWakeLock() { if (wakeLock !== null) { wakeLock.release(); wakeLock = null; } }
    els.btnWakeLock.addEventListener('click', () => wakeLock !== null ? releaseWakeLock() : requestWakeLock());

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && state.isRunning) requestWakeLock();
    });

    els.btnStart.addEventListener('click', () => {
        const now = Date.now();
        if (state.isRunning) {
            state.accumulatedTime += now - state.startTime;
            state.isRunning = false;
            els.btnStart.textContent = "Start"; els.btnStart.classList.add("primary");
            cancelAnimationFrame(animationFrameId);
            releaseWakeLock();
        } else {
            if (!state.baseShowTime && state.accumulatedTime === 0) { state.baseShowTime = now; updateBaseTimeDisplay(); }
            state.startTime = now; state.isRunning = true;
            els.btnStart.textContent = "Stop"; els.btnStart.classList.remove("primary");
            requestWakeLock(); updateTime();
        }
        saveState();
    });

    els.btnLap.addEventListener('click', () => {
        const lapData = {
            id: Date.now(), number: state.laps.length + 1,
            elapsed: state.isRunning ? state.accumulatedTime + (Date.now() - state.startTime) : state.accumulatedTime,
            realTime: formatRealTime(new Date()), memo: ""
        };
        state.laps.push(lapData); saveState(); appendLapToDOM(lapData);
    });

    els.btnReset.addEventListener('click', () => {
        if (confirm("記録をすべてリセットしますか？")) {
            state = { isRunning: false, startTime: 0, accumulatedTime: 0, baseShowTime: null, laps: [] };
            updateBaseTimeDisplay();
            els.btnStart.textContent = "Start"; els.btnStart.classList.add("primary");
            cancelAnimationFrame(animationFrameId); renderTime(0); els.lapList.innerHTML = '';
            saveState(); releaseWakeLock();
        }
    });

    function renderLaps() { els.lapList.innerHTML = ''; state.laps.forEach(appendLapToDOM); }
    function appendLapToDOM(lap) {
        const li = document.createElement('li'); li.className = 'sw-lap-item';
        li.innerHTML = `<span>#${lap.number}</span><span>${formatTime(lap.elapsed)}</span><span style="color:#aaa;">${lap.realTime}</span><input type="text" placeholder="メモ..." value="${lap.memo}">`;
        els.lapList.prepend(li);
        li.querySelector('input').addEventListener('input', (e) => {
            const target = state.laps.find(l => l.id === lap.id);
            if (target) { target.memo = e.target.value; saveState(); }
        });
    }

    els.btnExport.addEventListener('click', () => {
        if (state.laps.length === 0) return alert("出力する記録がありません。");
        let csv = "No,経過時間,現実時刻,メモ\n";
        state.laps.forEach(l => csv += `${l.number},${formatTime(l.elapsed)},${l.realTime},"${l.memo.replace(/"/g, '""')}"\n`);
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv;charset=utf-8;' }));
        a.download = `stage_record_${formatRealTime().replace(/:/g, '')}.csv`; a.click();
    });

    init();
})();


// ==========================================
// アプリ2: バータイマー ロジック (Flatpickr・通知・相対時間 復元)
// ==========================================
(() => {
    const els = {
        container: document.getElementById('bt-timeInputs'),
        btnWakeLock: document.getElementById('bt-btn-wakelock'),
        wakeLockDot: document.getElementById('bt-wake-lock-dot'),
        currentTime: document.getElementById('bt-currentTime'),
        status: document.getElementById('bt-status'),
        countdown: document.getElementById('bt-countdown'),
        progressBar: document.getElementById('bt-progress-bar'),
        mainBtn: document.getElementById('bt-mainBtn'),
        btnStartNow: document.getElementById('bt-btn-start-now'),
        btnClearAll: document.getElementById('bt-btn-clear-all'),
        btnAddTop: document.getElementById('bt-btn-add-top'), // ★追加
        btnAddEmpty: document.getElementById('bt-btn-add-empty'),
        btnAddRel: document.getElementById('bt-btn-add-rel'),
        relMinsInput: document.getElementById('bt-relMins')
    };

    let isRunning = false;
    let wakeLock = null;
    let lastNotifiedIndex = null; // 通知機能用

    // --- 消灯防止 ---
    async function requestWakeLock() {
        if (!('wakeLock' in navigator) || wakeLock !== null) return;
        try {
            wakeLock = await navigator.wakeLock.request('screen');
            els.wakeLockDot.classList.add('active'); els.btnWakeLock.classList.add('active-lock');
            wakeLock.addEventListener('release', () => {
                els.wakeLockDot.classList.remove('active'); els.btnWakeLock.classList.remove('active-lock');
                wakeLock = null;
            });
        } catch (err) { console.warn('BT Wake Lock error:', err); }
    }
    function releaseWakeLock() { if (wakeLock !== null) { wakeLock.release(); wakeLock = null; } }
    els.btnWakeLock.addEventListener('click', () => wakeLock !== null ? releaseWakeLock() : requestWakeLock());
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible' && isRunning) requestWakeLock(); });

    // --- 通知許可 ---
    function requestNotificationPermission() {
        if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }
    }
    function sendNotification(title, body) {
        if ("Notification" in window && Notification.permission === "granted") {
            new Notification(title, { body: body });
        }
    }

    // --- データ保存・展開 ---
    function saveData() {
        const inputs = Array.from(els.container.querySelectorAll('.target-time')).map(i => i.value);
        localStorage.setItem('barTimerSchedule', JSON.stringify(inputs));
    }

    // ★変更：position ('bottom', 'after', 'top') を受け取れるように拡張
    function addInput(value, position = 'bottom', refElement = null) {
        const div = document.createElement('div');
        div.className = 'bt-time-row';
        div.innerHTML = `
            <input type="text" class="target-time" value="${value}" readonly placeholder="--:--">
            <button class="bt-btn-insert" title="この下に追加">＋</button>
            <button class="bt-btn-del" title="削除">×</button>
        `;
        
        const input = div.querySelector('input');
        const btnDel = div.querySelector('.bt-btn-del');
        const btnInsert = div.querySelector('.bt-btn-insert');

        btnDel.addEventListener('click', () => { 
            if (input._flatpickr) input._flatpickr.destroy();
            div.remove(); 
            saveData(); 
        });

        // ＋ボタン（途中挿入）の処理
        btnInsert.addEventListener('click', () => {
            addInput('', 'after', div);
        });

        // 挿入場所の判定
        if (position === 'top') {
            els.container.insertBefore(div, els.container.firstChild);
        } else if (position === 'after' && refElement && refElement.nextSibling) {
            els.container.insertBefore(div, refElement.nextSibling);
        } else {
            // 末尾に追加（'bottom'、もしくは対象の次要素がない場合）
            els.container.appendChild(div);
        }

        flatpickr(input, {
            enableTime: true,
            noCalendar: true,
            dateFormat: "H:i",
            time_24hr: true,
            disableMobile: true, // スマホ標準UIを回避する設定
            onChange: function() { saveData(); }
        });
        
        saveData();
    }

    function loadData() {
        const saved = localStorage.getItem('barTimerSchedule');
        els.container.innerHTML = '';
        if (saved) {
            const times = JSON.parse(saved);
            if (times.length > 0) return times.forEach(t => addInput(t));
        }
        addInput('23:00'); addInput('01:00');
    }

    // --- 各種ボタンイベント ---
    els.btnClearAll.addEventListener('click', () => {
        if (confirm("設定した時刻をすべて消去しますか？")) {
            els.container.querySelectorAll('.target-time').forEach(input => {
                if (input._flatpickr) input._flatpickr.destroy();
            });
            els.container.innerHTML = ''; 
            addInput(''); 
            saveData();
        }
    });

    els.btnAddEmpty.addEventListener('click', () => addInput(''));
    
    // ★追加：先頭に追加ボタン
    els.btnAddTop.addEventListener('click', () => addInput('', 'top'));

    // 復元：相対時間（〇〇分後）の追加ロジック
    els.btnAddRel.addEventListener('click', () => {
        const min = parseInt(els.relMinsInput.value) || 0;
        if (min <= 0) return;

        const inputs = Array.from(els.container.querySelectorAll('.target-time'));
        let baseDate = new Date();

        const lastFilled = [...inputs].reverse().find(input => input.value !== "");
        
        if (lastFilled) {
            const [h, m] = lastFilled.value.split(':').map(Number);
            baseDate.setHours(h, m, 0, 0);
        } else {
            const nowH = String(baseDate.getHours()).padStart(2, '0');
            const nowM = String(baseDate.getMinutes()).padStart(2, '0');
            const firstEmpty = inputs.find(i => i.value === "");
            if (firstEmpty) {
                firstEmpty._flatpickr.setDate(`${nowH}:${nowM}`);
            } else {
                addInput(`${nowH}:${nowM}`);
            }
        }

        baseDate.setMinutes(baseDate.getMinutes() + min);
        const newH = String(baseDate.getHours()).padStart(2, '0');
        const newM = String(baseDate.getMinutes()).padStart(2, '0');
        const targetTime = `${newH}:${newM}`;

        const updatedInputs = Array.from(els.container.querySelectorAll('.target-time'));
        const emptyInput = updatedInputs.find(i => i.value === "");
        
        if (emptyInput) {
            emptyInput._flatpickr.setDate(targetTime);
        } else {
            addInput(targetTime);
        }
        
        saveData();
    });

    els.btnStartNow.addEventListener('click', () => {
        const now = new Date();
        if (els.container.children.length === 0) addInput('');
        
        const firstInput = els.container.querySelector('.target-time');
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        firstInput._flatpickr.setDate(`${hh}:${mm}`);
        
        saveData();
        if (!isRunning) setTimerState(true);
    });

    function setTimerState(state) {
        requestNotificationPermission(); // 開始時に通知許可をリクエスト
        isRunning = state;
        els.mainBtn.textContent = isRunning ? "ストップ" : "スタート";
        els.mainBtn.style.background = isRunning ? "#e67e22" : "#27ae60";
        if (isRunning) lastNotifiedIndex = null;
        isRunning ? requestWakeLock() : releaseWakeLock();
    }

    els.mainBtn.addEventListener('click', () => setTimerState(!isRunning));

    // --- メインループ ---
    function updateTime() {
        const now = new Date();
        els.currentTime.textContent = `現在時刻: ${now.toLocaleTimeString()}`;
        if (!isRunning) return;

        const inputsList = Array.from(els.container.querySelectorAll('.target-time')).filter(i => i.value !== "");
        if (inputsList.length < 2) { els.status.textContent = "2つ以上の時刻が必要です"; return; }

        function buildSchedule(baseDate) {
            let dayOffset = 0, prevMinutes = -1;
            return inputsList.map(input => {
                const [h, m] = input.value.split(':').map(Number);
                const mins = h * 60 + m;
                if (prevMinutes !== -1 && mins < prevMinutes) dayOffset++;
                prevMinutes = mins;
                const d = new Date(baseDate);
                d.setDate(d.getDate() + dayOffset);
                d.setHours(h, m, 0, 0);
                return { time: d, element: input.parentElement, value: input.value };
            });
        }

        const today = new Date(now); today.setHours(0, 0, 0, 0);
        const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);

        let schedule = buildSchedule(today);
        const scheduleYesterday = buildSchedule(yesterday);
        const nowTime = now.getTime();

        if (nowTime >= scheduleYesterday[0].time.getTime() && nowTime < scheduleYesterday[scheduleYesterday.length - 1].time.getTime()) {
            schedule = scheduleYesterday;
        }

        let currentIndex = -1;
        for (let i = 0; i < schedule.length - 1; i++) {
            if (nowTime >= schedule[i].time.getTime() && nowTime < schedule[i+1].time.getTime()) { currentIndex = i; break; }
        }

        inputsList.forEach(i => i.parentElement.classList.remove('bt-active-row'));

        if (currentIndex !== -1) {
            const start = schedule[currentIndex].time.getTime(), end = schedule[currentIndex+1].time.getTime();
            const remainingMs = end - nowTime;
            
            els.progressBar.style.width = `${(remainingMs / (end - start)) * 100}%`;
            els.status.textContent = `${schedule[currentIndex].value} 〜 ${schedule[currentIndex+1].value}`;
            schedule[currentIndex].element.classList.add('bt-active-row');
            els.countdown.textContent = `${String(Math.floor(remainingMs / 60000)).padStart(2, '0')}:${String(Math.floor((remainingMs % 60000) / 1000)).padStart(2, '0')}`;

            // 復元：切り替わり時のプッシュ通知
            if (lastNotifiedIndex !== null && lastNotifiedIndex !== currentIndex) {
                sendNotification("次の予定です", `${schedule[currentIndex].value} 〜 ${schedule[currentIndex+1].value} が始まりました。`);
            }
            lastNotifiedIndex = currentIndex;

        } else if (nowTime < schedule[0].time.getTime()) {
            els.status.textContent = "開始時刻を待っています...";
            els.progressBar.style.width = '100%';
            els.countdown.textContent = "--:--";
        } else {
            els.status.textContent = "すべての予定が終了しました";
            els.progressBar.style.width = '0%';
            els.countdown.textContent = "00:00";
            
            // 復元：終了時のプッシュ通知
            if (lastNotifiedIndex !== 'finished') {
                sendNotification("終了しました", "すべての予定スケジュールが完了しました。");
                lastNotifiedIndex = 'finished';
            }

            if (isRunning) setTimerState(false);
        }
    }

    loadData();
    setInterval(updateTime, 1000);
})();
</script>
</body>
</html>
